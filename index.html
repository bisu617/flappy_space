<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flappy Space: Enhanced Edition</title>
    <style>
        body {
            margin: 0;
            background-color: #0a0a32;
            color: #00ffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #loading-screen {
            text-align: center;
            transition: opacity 0.5s ease-out;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(0, 255, 255, 0.1);
            border-left-color: #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .title {
            font-size: 24px;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00ffff;
        }

        .status {
            font-size: 14px;
            color: #ffffff;
            opacity: 0.8;
            margin-top: 5px;
        }

        #progress-container {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: #00ffff;
            box-shadow: 0 0 10px #00ffff;
            transition: width 0.3s ease;
        }

        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="title">INITIALIZING MISSION</div>
        <div class="status" id="status-text">Warming up engines...</div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <!-- This is where Pygbag will inject the game -->
    <div id="pygame"></div>

    <script type="text/javascript">
        // Helper to update status text randomly
        const statuses = [
            "Warming up engines...",
            "Calibrating ship sensors...",
            "Syncing with Supabase...",
            "Loading star maps...",
            "Deploying solar sails...",
            "Establishing Discord link..."
        ];
        let statusIdx = 0;
        const statusEl = document.getElementById('status-text');
        setInterval(() => {
            statusIdx = (statusIdx + 1) % statuses.length;
            statusEl.innerText = statuses[statusIdx];
        }, 1500);

        // This function is called by pygbag to update progress
        window.on_pygbag_progress = function(progress) {
            const bar = document.getElementById('progress-bar');
            bar.style.width = progress + '%';
            if (progress >= 100) {
                setTimeout(() => {
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                    }, 500);
                }, 500);
            }
        };
    </script>

    <!-- Standard Pygbag Script -->
    <script src="https://pygame-web.github.io/pygbag/pygbag.js" async defer></script>
</body>
</html>
